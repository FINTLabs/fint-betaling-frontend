apiVersion: fintlabs.no/v1alpha1
kind: Application
metadata:
  name: fint-betaling-frontend
  labels:
    app.kubernetes.io/name: fint-betaling-frontend
    app.kubernetes.io/instance: fint-betaling-frontend_vlfk_no
    app.kubernetes.io/version: latest
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: fint-core
    fintlabs.no/team: core
    fintlabs.no/org-id: vlfk.no
spec:
  port: 8000
  imagePullPolicy: Always
  orgId: vlfk.no
  image: ghcr.io/fintlabs/fint-betaling-frontend:latest-vlfk-no
  env:
    - name: BASE_PATH
      value: /vlfk
    - name: VITE_API_URL
      value: https://betaling.felleskomponent.no/vlfk
    - name: VITE_ANALYTICS_URL
      value: http://fint-analytics-frontend:3000
  url:
    hostname: betaling.felleskomponent.no
    basePath: /vlfk
  ingress:
    enabled: true
    middlewares:
      - fint-betaling-auth-forward-sso
  resources:
    limits:
      memory: "512Mi"
      cpu: "500m"
    requests:
      memory: "256Mi"
      cpu: "250m"
  restartPolicy: Always
