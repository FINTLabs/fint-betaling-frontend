name: CD

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  init:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}
    steps:
      - name: Set targets matrix
        id: set-matrix
        shell: bash
        run: |
          cluster="${{ inputs.cluster }}"

          if [[ "$cluster" == "aks-api-fint-2022-02-08" ]]; then
            targets='[
              {"org":"afk-no","basePath":"/afk"},
              {"org":"bfk-no","basePath":"/bfk"},
              {"org":"ofk-no","basePath":"/ofk"},
              {"org":"vlfk-no","basePath":"/vlfk"},
              {"org":"tromsfylke-no","basePath":"/tromsfylke"}
            ]'
          elif [[ "$cluster" == "aks-beta-fint-2021-11-23" ]]; then
            targets='[
              {"org":"fintlabs-no","basePath":"/"}
            ]'
          else
            echo "Unknown cluster: $cluster" >&2
            exit 1
          fi

          echo "targets=$(echo "$targets" | jq -c .)" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    name: build and deploy ${{ matrix.org }} to ${{ inputs.cluster }}
    runs-on: ubuntu-latest
    needs: init

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.init.outputs.targets) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: image
        shell: bash
        run: |
          IMAGE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)

          echo "sha_tag=${IMAGE}:sha-${SHORT_SHA}-${{ matrix.org }}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE}:latest-${{ matrix.org }}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            BASE_PATH=${{ matrix.basePath }}
          tags: |
            ${{ steps.image.outputs.sha_tag }}
            ${{ steps.image.outputs.latest_tag }}

      - name: Get environment
        uses: actions/github-script@v9
        id: environment
        with:
          script: |
            const cluster = '${{ inputs.cluster }}'
            
            if (cluster === 'aks-api-fint-2022-02-08') {
              return 'API'
            }
            
            if (cluster === 'aks-beta-fint-2021-11-23') {
              return 'BETA'
            }
            
            throw new Error(`Unknown cluster: ${cluster}`)
          result-encoding: string

      - name: Get resource group name
        uses: actions/github-script@v9
        id: resource-group
        with:
          script: return 'rg-aks-${{ steps.environment.outputs.result }}'
          result-encoding: string

      - name: Bake manifests with Kustomize
        id: bake
        uses: azure/k8s-bake@v4
        with:
          renderEngine: kustomize
          kustomizationPath: kustomize/overlays/${{ steps.environment.outputs.result }}/${{ matrix.org }}

      - name: Login to Azure (dev)
        if: steps.environment.outputs.result == 'dev'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AKS_DEV_FINT_GITHUB }}

      - name: Login to Azure (prod)
        if: steps.environment.outputs.result == 'prod'
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AKS_PROD_FINT_GITHUB }}

      - name: Use kubelogin
        uses: azure/use-kubelogin@v1.3
        with:
          kubelogin-version: v0.0.26

      - name: Set the target cluster
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ inputs.cluster }}
          resource-group: ${{ steps.resource-group.outputs.result }}
          admin: true
          use-kubelogin: true

      - name: Create namespace if it does not exist
        run: |
          if ! kubectl get namespace "${{ matrix.org }}"; then
            kubectl create namespace "${{ matrix.org }}"
          fi

      - name: Deploy
        uses: azure/k8s-deploy@v6
        with:
          action: deploy
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          images: ${{ steps.image.outputs.sha_tag }}
          namespace: ${{ matrix.org }}