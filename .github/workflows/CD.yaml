name: CD

on:
  workflow_call:
    inputs:
      cluster:
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  init:
    runs-on: ubuntu-latest

    outputs:
      targets: ${{ steps.set-matrix.outputs.targets }}

    steps:
      - name: Set targets matrix
        id: set-matrix
        shell: bash
        run: |
          cluster="${{ inputs.cluster }}"

          if [[ "$cluster" == "aks-api-fint-2022-02-08" ]]; then
            targets='[
              {"org":"afk-no","basePath":"/afk"},
              {"org":"bfk-no","basePath":"/bfk"},
              {"org":"ofk-no","basePath":"/ofk"},
              {"org":"vlfk-no","basePath":"/vlfk"},
              {"org":"tromsfylke-no","basePath":"/tromsfylke"}
            ]'
          elif [[ "$cluster" == "aks-beta-fint-2021-11-23" ]]; then
            targets='[
              {"org":"fintlabs-no","basePath":"/"}
            ]'
          else
            echo "Unknown cluster: $cluster" >&2
            exit 1
          fi

          {
            echo 'targets<<EOF'
            echo "$targets"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
          echo "Computed targets for $cluster: $targets"

  build-and-deploy:
    name: build and deploy for ${{ matrix.org }} to ${{ inputs.cluster }}

    runs-on: ubuntu-latest

    needs:
      - init

    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.init.outputs.targets) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Get environment
        uses: actions/github-script@v9
        id: environment
        with:
          script: |
            const cluster = '${{ inputs.cluster }}';

            if (cluster === 'aks-api-fint-2022-02-08') {
              return 'api';
            }

            if (cluster === 'aks-beta-fint-2021-11-23') {
              return 'beta';
            }

            throw new Error(`Unknown cluster: ${cluster}`);
          result-encoding: string

      - name: Get secret suffix
        uses: actions/github-script@v9
        id: secret-suffix
        with:
          script: return '${{ steps.environment.outputs.result }}'.toUpperCase()
          result-encoding: string

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,enable=true,priority=100,prefix=sha-,suffix=-${{ matrix.org }},format=short
            type=raw,value=latest-${{ matrix.org }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            BASE_PATH=${{ matrix.basePath }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Get resource group name
        uses: actions/github-script@v9
        id: resource-group
        with:
          script: return 'rg-aks-${{ steps.environment.outputs.result }}'
          result-encoding: string

      - name: Bake manifests with Kustomize
        id: bake
        uses: azure/k8s-bake@v4
        with:
          renderEngine: kustomize
          kustomizationPath: kustomize/overlays/${{ steps.environment.outputs.result }}/${{ matrix.org }}

      - name: Login to Azure (DEV)
        if: ${{ steps.secret-suffix.outputs.result == 'DEV' }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AKS_DEV_FINT_GITHUB }}

      - name: Login to Azure (PROD)
        if: ${{ steps.secret-suffix.outputs.result == 'PROD' }}
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AKS_PROD_FINT_GITHUB }}

      - uses: azure/use-kubelogin@v1.3
        with:
          kubelogin-version: v0.0.26

      - name: Set the target cluster
        uses: azure/aks-set-context@v5
        with:
          cluster-name: ${{ inputs.cluster }}
          resource-group: ${{ steps.resource-group.outputs.result }}
          admin: true
          use-kubelogin: true

      - name: Create Namespace if it doesn't exist
        run: |
          if ! kubectl get namespace ${{ matrix.org }} >/dev/null 2>&1; then
            kubectl create namespace ${{ matrix.org }}
          fi

      - name: Deploy
        uses: azure/k8s-deploy@v6
        with:
          action: deploy
          manifests: ${{ steps.bake.outputs.manifestsBundle }}
          images: ${{ steps.meta.outputs.tags }}
          namespace: ${{ matrix.org }}